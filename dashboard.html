<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERDL Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; padding: 24px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .badge { background: #1a7f37; color: #7ee787; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #e6edf3; }
  .stat-label { font-size: 11px; color: #8b949e; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .section-title { font-size: 13px; font-weight: 600; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .rule-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; }
  .rule-card:hover { border-color: #6366f1; }
  .rule-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .rule-id { font-size: 12px; color: #6366f1; font-weight: 600; font-family: monospace; }
  .rule-decision { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  .decision-allow { background: #1a3a2a; color: #7ee787; }
  .decision-deny { background: #3a1a1a; color: #ff7b72; }
  .rule-name { font-size: 14px; font-weight: 600; color: #e6edf3; margin-bottom: 4px; }
  .rule-desc { font-size: 12px; color: #8b949e; line-height: 1.4; }
  .rule-hits { font-size: 11px; color: #484f58; margin-top: 6px; }
  .empty { text-align: center; padding: 40px; color: #484f58; font-size: 13px; }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .refresh-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { background: #30363d; }
  .last-updated { font-size: 11px; color: #484f58; }
</style>
</head>
<body>
<div class="refresh-bar">
  <div class="header"><span class="logo">ERDL</span><span class="badge">v1.0-alpha</span></div>
  <div>
    <button class="refresh-btn" onclick="load()">⟳ Refresh</button>
    <span class="last-updated" id="updated">--</span>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="section-title">📋 最近活动</div>
<div id="activity" style="margin-bottom: 20px;"></div>

<div class="section-title">🧑‍💻 编码规则</div>
<div id="coding-rules"></div>

<div class="section-title">✍️ 写作规则</div>
<div id="writing-rules"></div>

<div class="section-title">🎨 设计规则</div>
<div id="design-rules"></div>

<script>
async function load() {
  // In OpenClaw Canvas, this is a static page. 
  // The ERDL dashboard reads from ~/.openoba/rules/ via MCP.
  // For now, show static demo with real stats placeholder.
  
  document.getElementById('updated').textContent = new Date().toLocaleTimeString()
  
  // Placeholder — in production, fetch from erdl-mcp via MCP or HTTP API
  const rules = [
    { id: 'no_any', name: '禁止 any 类型', desc: '禁止使用 any，用 unknown 替代', cat: 'coding', decision: 'DENY', hits: 7 },
    { id: 'no_ts_ignore', name: '禁止 @ts-ignore', desc: '修复类型错误而非抑制', cat: 'coding', decision: 'DENY', hits: 3 },
    { id: 'naming_conventions', name: '命名规范', desc: 'camelCase / PascalCase / UPPER_SNAKE', cat: 'coding', decision: 'ALLOW', hits: 12 },
    { id: 'handle_promises', name: 'Promise 处理', desc: '必须 await 或 .catch()', cat: 'coding', decision: 'ALLOW', hits: 5 },
    { id: 'commit_format', name: 'Commit 格式', desc: 'type(scope): description', cat: 'coding', decision: 'ALLOW', hits: 8 },
    { id: 'no_cliche', name: '禁止套话', desc: '不要用"在当今时代"开头', cat: 'writing', decision: 'DENY', hits: 2 },
    { id: 'direct_tone', name: '直接有力', desc: '主动语态，不用模糊表达', cat: 'writing', decision: 'ALLOW', hits: 4 },
    { id: 'tailwind_first', name: 'Tailwind 优先', desc: '不用 inline style', cat: 'design', decision: 'ALLOW', hits: 6 },
  ]
  
  const totalHits = rules.reduce((s, r) => s + (r.hits || 0), 0)
  const denies = rules.filter(r => r.decision === 'DENY').length
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${rules.length}</div><div class="stat-label">规则总数</div></div>
    <div class="stat-card"><div class="stat-value">${totalHits}</div><div class="stat-label">总命中次数</div></div>
    <div class="stat-card"><div class="stat-value">${denies}</div><div class="stat-label">阻断规则</div></div>
    <div class="stat-card"><div class="stat-value">${rules.length - denies}</div><div class="stat-label">允许规则</div></div>
  `
  
  document.getElementById('activity').innerHTML = `
    <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;font-size:12px;color:#7ee787;">
      🟢 刚刚 · <code>no_any</code> 命中 · DENY · "write typescript code with any"
    </div>
  `
  
  renderRules('coding', rules.filter(r => r.cat === 'coding'))
  renderRules('writing', rules.filter(r => r.cat === 'writing'))
  renderRules('design', rules.filter(r => r.cat === 'design'))
}

function renderRules(id, rules) {
  const el = document.getElementById(id + '-rules')
  if (rules.length === 0) {
    el.innerHTML = '<div class="empty">暂无规则</div>'
    return
  }
  el.innerHTML = rules.map(r => `
    <div class="rule-card">
      <div class="rule-header">
        <span class="rule-id">${r.id}</span>
        <span class="rule-decision ${r.decision === 'DENY' ? 'decision-deny' : 'decision-allow'}">${r.decision}</span>
      </div>
      <div class="rule-name">${r.name}</div>
      <div class="rule-desc">${r.desc}</div>
      <div class="rule-hits">命中 ${r.hits} 次</div>
    </div>
  `).join('')
}

load()
setInterval(load, 10000)
</script>
</body>
</html>
