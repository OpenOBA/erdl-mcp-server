<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERDL Dashboard</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;padding:24px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo{font-size:28px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:#1a7f37;color:#7ee787;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.stat-value{font-size:28px;font-weight:700;color:#e6edf3}
.stat-label{font-size:11px;color:#8b949e;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.section-title{font-size:13px;font-weight:600;color:#8b949e;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.rule-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px;margin-bottom:8px}
.rule-card:hover{border-color:#6366f1}
.rule-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rule-id{font-size:12px;color:#6366f1;font-weight:600;font-family:monospace}
.rule-decision{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
.allow{background:#1a3a2a;color:#7ee787}.deny{background:#3a1a1a;color:#ff7b72}.pass{background:#1a2a3a;color:#79c0ff}
.rule-name{font-size:14px;font-weight:600;color:#e6edf3;margin-bottom:4px}
.rule-desc{font-size:12px;color:#8b949e;line-height:1.4}
.rule-hits{font-size:11px;color:#484f58;margin-top:6px}
.override-badge{background:#3a1a3a;color:#d2a8ff;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px}
.empty{text-align:center;padding:40px;color:#484f58;font-size:13px}
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.refresh-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.refresh-btn:hover{background:#30363d}
.last-updated{font-size:11px;color:#484f58;margin-left:12px}
.loading{text-align:center;padding:20px;color:#6366f1;font-size:13px}
.error{text-align:center;padding:20px;color:#ff7b72;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;background:#21262d;border:1px solid #30363d;color:#8b949e}
.tab.active{background:#1f2a3d;border-color:#6366f1;color:#e6edf3}
.activity-entry{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px}
.activity-decision{padding:2px 8px;border-radius:6px;font-weight:600;font-size:10px}
.activity-time{color:#484f58;font-size:11px;margin-left:auto}
</style></head>
<body>
<div class="refresh-bar">
  <div class="header"><span class="logo">ERDL</span><span class="badge">live</span></div>
  <div><button class="refresh-btn" onclick="load()">⟳ Refresh</button><span class="last-updated" id="updated"></span></div>
</div>
<div class="stats" id="stats"></div>
<div class="section-title">📋 最近活动</div>
<div id="activity" style="margin-bottom:20px"></div>
<div class="tabs">
  <div class="tab active" onclick="showTab('all')">全部</div>
  <div class="tab" onclick="showTab('coding')">🧑‍💻 编码</div>
  <div class="tab" onclick="showTab('writing')">✍️ 写作</div>
  <div class="tab" onclick="showTab('design')">🎨 设计</div>
  <div class="tab" onclick="showTab('engineering')">⚙️ 工程</div>
</div>
<div id="rules-container"></div>

<script>
const API = 'http://127.0.0.1:18790/api';
let currentTab = 'all';
let allRules = [];

async function load() {
  document.getElementById('updated').textContent = 'loading...';
  try {
    const res = await fetch(API+'/rules');
    const data = await res.json();
    allRules = data.rules || [];
    render();
    document.getElementById('updated').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('updated').textContent = 'API offline';
    document.getElementById('stats').innerHTML = '<div class="error">ERDL MCP Server 未运行。启动: npx @openoba/erdl-mcp</div>';
  }
}

function render() {
  const cats = ['coding','writing','design','engineering','custom'];
  const counts = {};
  cats.forEach(c => counts[c] = allRules.filter(r => r.category === c).length);
  const total = allRules.length;
  const denies = allRules.filter(r => r.action?.decision === 'DENY').length;
  const overrides = allRules.filter(r => r.override).length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">规则总数</div></div>
    <div class="stat-card"><div class="stat-value">${denies}</div><div class="stat-label">阻断规则</div></div>
    <div class="stat-card"><div class="stat-value">${total-denes}</div><div class="stat-label">允许规则</div></div>
    <div class="stat-card"><div class="stat-value">${overrides}</div><div class="stat-label">override</div></div>
  `;
  
  document.getElementById('activity').innerHTML = formatActivity();
  
  const filtered = currentTab === 'all' ? allRules : allRules.filter(r => r.category === currentTab);
  const grouped = {};
  filtered.forEach(r => {
    const cat = r.category || 'other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(r);
  });
  
  const catMeta = { coding:{icon:'🧑‍💻',label:'编码规则'}, writing:{icon:'✍️',label:'写作规则'},
    design:{icon:'🎨',label:'设计规则'}, engineering:{icon:'⚙️',label:'工程规则'}, custom:{icon:'📦',label:'自定义'} };
  
  let html = '';
  for (const [cat, rules] of Object.entries(grouped)) {
    const m = catMeta[cat] || {icon:'📋',label:cat};
    html += `<div class="section-title">${m.icon} ${m.label} (${rules.length})</div>`;
    rules.sort((a,b)=>(a.priority||100)-(b.priority||100)).forEach(r => {
      html += `<div class="rule-card">
        <div class="rule-header">
          <span class="rule-id">${r.id} ${r.override ? '<span class="override-badge">override</span>' : ''}</span>
          <span class="rule-decision ${r.action?.decision === 'DENY' ? 'deny' : r.action?.decision === 'ALLOW' ? 'allow' : 'pass'}">${r.action?.decision||'PASS'}</span>
        </div>
        <div class="rule-name">${r.name}</div>
        <div class="rule-desc">${r.description||''}</div>
      </div>`;
    });
  }
  if (!html) html = '<div class="empty">暂无规则</div>';
  document.getElementById('rules-container').innerHTML = html;
}

function formatActivity() {
  if (allRules.length === 0) return '<div class="empty">等待加载规则...</div>';
  return `<div class="activity-entry"><span class="activity-decision allow">ACTIVE</span> ${allRules.length} 条规则已加载。${allRules.filter(r=>r.override).length} 条 override。<span class="activity-time">${new Date().toLocaleTimeString()}</span></div>`;
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => { if (t.textContent.includes(tab === 'all' ? '全部' : tab === 'coding' ? '编码' : tab === 'writing' ? '写作' : tab === 'design' ? '设计' : '工程')) t.classList.add('active'); });
  currentTab = tab;
  render();
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
