# ERDL Rule — REPRO_BEFORE_FIX
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "repro_before_fix"
  description: "先复现再修复"
  tags: [testing]

rules:
  - name: "repro_before_fix"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: CORRECT
    message: "先写复现测试（RED），确认问题存在，再修复（GREEN），最后重构（REFACTOR）。"
