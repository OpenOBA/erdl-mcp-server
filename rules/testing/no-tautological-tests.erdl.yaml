# ERDL Rule — NO_TAUTOLOGICAL_TESTS
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_tautological_tests"
  description: "禁止循环论证测试"
  tags: [testing]

rules:
  - name: "no_tautological_tests"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: CORRECT
    message: "避免'期望 mock 返回 mock 结果'式的测试。测试真实逻辑。"
