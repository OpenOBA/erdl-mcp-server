# ERDL Rule — CRITICAL_PATH_FULL_COVERAGE
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "critical_path_full_coverage"
  description: "关键路径全覆盖"
  tags: [testing]

rules:
  - name: "critical_path_full_coverage"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: CORRECT
    message: "付款、登录、权限、数据删除等关键路径必须 100% 覆盖率。"
