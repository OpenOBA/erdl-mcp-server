# ERDL Rule — TEST_AS_DOCUMENTATION
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "test_as_documentation"
  description: "测试即文档"
  tags: [testing]

rules:
  - name: "test_as_documentation"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: ALLOW
    message: "测试即文档。测试名和断言应描述业务行为，而非实现细节。"
