# ERDL Rule — NO_FLAKY_TESTS
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_flaky_tests"
  description: "禁止 flaky test"
  tags: [testing]

rules:
  - name: "no_flaky_tests"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: 'setTimeout|sleep|Math\.random'
    then: CORRECT
    message: "测试中避免 setTimeout/sleep/Math.random。用 mock timer 和 seed。"
