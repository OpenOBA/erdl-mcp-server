# ERDL Rule — NO_FEATURE_ON_BROKEN_BUILD
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_feature_on_broken_build"
  description: "不基于 broken build 开发"
  tags: [testing]

rules:
  - name: "no_feature_on_broken_build"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "build|compile|typecheck|npm test"
    then: CORRECT
    message: "不要在 broken build 上加新功能。先修 build，再开发。"
