# ERDL Rule — TEST_AUDIT_TRAIL
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "test_audit_trail"
  description: "测试审计追溯"
  tags: [testing]

rules:
  - name: "test_audit_trail"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: ALLOW
    message: "每个测试应能追溯到一个需求/Bug/Story。测试不仅验证代码，也记录决策。"
