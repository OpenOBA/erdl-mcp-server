# ERDL Rule — COVERAGE_NEVER_DROPS
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "coverage_never_drops"
  description: "覆盖率不降"
  tags: [testing]

rules:
  - name: "coverage_never_drops"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: CORRECT
    message: "新增代码的测试覆盖率不低于现有水平。覆盖率只升不降。"
