# ERDL Rule — NO_IMPLEMENTATION_COUPLED_TESTS
# Category: testing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_implementation_coupled_tests"
  description: "测试解耦实现"
  tags: [testing]

rules:
  - name: "no_implementation_coupled_tests"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "test|spec|expect|assert"
    then: ALLOW
    message: "测试验证行为，不验证实现细节。重构不应破坏测试。"
