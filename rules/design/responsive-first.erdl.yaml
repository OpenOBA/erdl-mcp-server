# ERDL Rule — RESPONSIVE_FIRST
# Category: design
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "responsive_first"
  description: "响应式优先"
  tags: [design]

rules:
  - name: "responsive_first"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "@media|responsive"
    then: CORRECT
    message: "移动端优先设计。先写手机布局，再用 @media 适配桌面。"
