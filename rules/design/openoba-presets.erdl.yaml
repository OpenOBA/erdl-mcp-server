# ERDL Rules — Design · Agent Context

rules:
  tailwind_first:
    when: intent in ("write_component", "create_ui")
    then: ALLOW "优先 Tailwind CSS。不用 inline style 或 CSS module（除非 Tailwind 无法表达）。常用: flex grid text- bg- p- m- rounded- shadow-。"
    priority: 5
    category: design
    description: Tailwind 优先

  responsive_first:
    when: intent in ("write_component", "create_ui")
    then: ALLOW "移动端优先。Tailwind 断点: sm: md: lg: xl: 2xl:。至少 3 个断点。"
    priority: 5
    category: design
    description: 响应式优先

  a11y_basics:
    when: intent in ("write_component", "create_ui") AND (output_text contains "button" OR output_text contains "form" OR output_text contains "input" OR output_text contains "modal")
    then: ALLOW "无障碍: (1) 键盘可达 (tabIndex, onKeyDown) (2) WCAG AA 4.5:1 对比度 (3) 图片 alt (4) 表单 label (5) 语义 HTML (button/nav/main/article)。"
    priority: 5
    category: design
    description: 无障碍基础
    override: true
