# ERDL Rule — A11Y_BASICS
# Category: design
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "a11y_basics"
  description: "无障碍基础检查"
  tags: [design]

rules:
  - name: "a11y_basics"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "aria-|alt=|role="
    then: CORRECT
    message: "无障碍：图片加 alt，交互元素加 aria- 属性，表单用 label。"
