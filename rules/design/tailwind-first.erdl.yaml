# ERDL Rule — TAILWIND_FIRST
# Category: design
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "tailwind_first"
  description: "Tailwind 优先"
  tags: [design]

rules:
  - name: "tailwind_first"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "tailwind|className="
    then: CORRECT
    message: "优先使用 Tailwind utility classes，不在组件内写内联 style。"
