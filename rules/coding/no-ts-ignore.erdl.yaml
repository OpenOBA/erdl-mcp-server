# ERDL Rule — NO_TS_IGNORE
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_ts_ignore"
  description: "禁止 @ts-ignore"
  tags: [coding]

rules:
  - name: "no_ts_ignore"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "@ts-ignore|@ts-expect-error"
    then: ALLOW
    message: "不要用 @ts-ignore/@ts-expect-error。修复类型错误而非抑制。"
