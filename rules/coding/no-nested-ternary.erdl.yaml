# ERDL Rule — NO_NESTED_TERNARY
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_nested_ternary"
  description: "禁止嵌套三元"
  tags: [coding]

rules:
  - name: "no_nested_ternary"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: '\?.*:.*\?'
    then: ALLOW
    message: "禁止嵌套三元表达式。用 if/else 或提前返回。"
