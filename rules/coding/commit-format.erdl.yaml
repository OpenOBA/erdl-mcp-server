# ERDL Rule — COMMIT_FORMAT
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "commit_format"
  description: "Commit 格式提醒"
  tags: [coding]

rules:
  - name: "commit_format"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "git commit|commit message"
    then: ALLOW
    message: "Commit: type(scope): description (feat/fix/docs/refactor/test/chore/style)。"
