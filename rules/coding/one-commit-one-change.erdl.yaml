# ERDL Rule — ONE_COMMIT_ONE_CHANGE
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "one_commit_one_change"
  description: "一个 commit 一个变更"
  tags: [coding]

rules:
  - name: "one_commit_one_change"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "git commit"
    then: ALLOW
    message: "一个 commit = 一个逻辑变更。不混交重构和功能。"
