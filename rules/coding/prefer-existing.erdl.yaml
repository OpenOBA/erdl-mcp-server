# ERDL Rule — PREFER_EXISTING
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "prefer_existing"
  description: "优先使用已有依赖"
  tags: [coding]

rules:
  - name: "prefer_existing"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "install|add package|new library"
    then: ALLOW
    message: "推荐新依赖前先检查已有依赖。"
