# ERDL Rule — NO_ANY
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_any"
  description: "禁止 any 类型"
  tags: [coding]

rules:
  - name: "no_any"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "\bany\b"
    then: CORRECT
    message: "禁止 any 类型。优先级：具体类型 > unknown + 类型守卫 > as any。"
