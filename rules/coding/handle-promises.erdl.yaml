# ERDL Rule — HANDLE_PROMISES
# Category: coding
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "handle_promises"
  description: "Promise 必须处理"
  tags: [coding]

rules:
  - name: "handle_promises"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "Promise|async"
    then: ALLOW
    message: "所有 Promise 必须 await 或 .catch()。"
