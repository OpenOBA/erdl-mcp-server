# ERDL Rule — SESSION MEMORY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "session_memory"
  description: "会话记忆提醒"
  tags: [engineering]

rules:
  - name: "session_memory"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "每次会话结束后记录当天工作和决策，形成可追溯的工作日志。"
