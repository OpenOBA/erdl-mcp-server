# ERDL Rule — DOCS WITH DELIVERY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "docs_with_delivery"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "docs_with_delivery"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "代码写完不算完，文档写完才算。文档即交付。"