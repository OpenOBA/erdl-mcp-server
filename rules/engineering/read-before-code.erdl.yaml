# ERDL Rule — READ BEFORE CODE
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "read_before_code"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "read_before_code"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "修改代码前先读相关源码+调用链+Entity定义。先理解，再动手。"