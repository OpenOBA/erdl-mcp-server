# ERDL Rule — DECISION LOG
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "decision_log"
  description: "决策日志提醒"
  tags: [engineering]

rules:
  - name: "decision_log"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "关键决策记录在项目决策日志中，写清语境、选项、理由、后果。"
