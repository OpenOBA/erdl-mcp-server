# ERDL Rule — STAY ON TARGET
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "stay_on_target"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "stay_on_target"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "不偏离 spec 和当前目标。对话跑偏时主动拉回。"