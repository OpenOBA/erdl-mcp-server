# ERDL Rule — PROGRESS VISIBILITY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "progress_visibility"
  description: "进度可见提醒"
  tags: [engineering]

rules:
  - name: "progress_visibility"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "工作进度对团队可见。重大变更主动同步，不闷头干。"
