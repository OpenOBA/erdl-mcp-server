# ERDL Rule — KNOWLEDGE CAPTURE
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "knowledge_capture"
  description: "知识捕获提醒"
  tags: [engineering]

rules:
  - name: "knowledge_capture"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "踩坑就记录。每次解决新问题后更新项目知识库或工作日志。"
