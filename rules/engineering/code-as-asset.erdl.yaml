# ERDL Rule — CODE AS ASSET
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "code_as_asset"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "code_as_asset"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "代码是长期资产，不只是一次交付。可读性 > 巧妙性。未来维护者会感谢你。"