# ERDL Rule — CHANGE SUMMARY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "change_summary"
  description: "变更摘要提醒"
  tags: [engineering]

rules:
  - name: "change_summary"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "每次变更完成后写清晰的中文摘要，方便未来的自己和合作者快速了解。"
