# ERDL Rule — MINIMAL DELIVERY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "minimal_delivery"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "minimal_delivery"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "一次只解决一个问题。不顺便重构、不顺手优化、不夹带私货。"