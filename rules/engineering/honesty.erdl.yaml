# ERDL Rule — HONESTY
# Category: engineering
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "honesty"
  description: "诚实汇报"
  tags: [engineering]

rules:
  - name: "honesty"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "诚实地汇报：遇到问题如实知会，不知道就说不知道，做错了就承认。"
