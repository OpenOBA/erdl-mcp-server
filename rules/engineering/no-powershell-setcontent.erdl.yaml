# ERDL Rule — NO_POWERSHELL_SETCONTENT
# Category: engineering
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_powershell_setcontent"
  description: "禁用 Set-Content/Out-File"
  tags: [engineering]

rules:
  - name: "no_powershell_setcontent"
    priority: 4
    when:
      logic: OR
      conditions:
        - field: "tool.args.command"
          operator: match
          value: "Set-Content"
        - field: "tool.args.command"
          operator: match
          value: "Out-File"
    then: DENY
    override: high
    message: "禁止 Set-Content / Out-File。会损坏 UTF-8 编码。替代：write 工具。"
