# ERDL Rule — DESIGN BEFORE CODE
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "design_before_code"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "design_before_code"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "先设计方案，再写代码。先对齐方向，再动手。"