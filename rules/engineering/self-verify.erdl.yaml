# ERDL Rule — SELF VERIFY
# Category: engineering · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "self_verify"
  description: "engineering rule"
  tags: [engineering]

rules:
  - name: "self_verify"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "提交前自己先 build → test → 实测。不依赖别人发现你的错误。"