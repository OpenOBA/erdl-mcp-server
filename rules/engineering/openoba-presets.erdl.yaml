    description: "全局优先: 不为当前任务破坏一致性。不追求速度，以质量为准。"
    when: "true"
    then: ALLOW "全局优先: 不为当前任务破坏一致性。不追求速度，以质量为准。"
    priority: 2

  EN-004:
    name: design_before_code
    description: "Spec 先行: 先与 ERDL Spec 对齐。不先写代码再补 Spec。"
    when: "true"
    then: ALLOW "Spec 先行: 先与 ERDL Spec 对齐。不先写代码再补 Spec。"
    priority: 3

  EN-005:
    name: no_stash
    description: "禁止 git stash 累积。所有变更必须入 commit。"
