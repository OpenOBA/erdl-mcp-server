  EN-007:
    name: pipeline_before_push
    description: "推送前: typecheck 0 error → build 0 error → test all pass。"
    when: "tool.args.command contains \"push\""
    then: ALLOW "推送前: typecheck 0 error → build 0 error → test all pass。"
    priority: 3

  EN-008:
    name: no_shortcut
    description: "禁止临时方案/workaround/hack。现在就从根本上解决。"
