# ERDL Rule — HEALTH_CHECK
# Category: observability
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "health_check"
  description: "健康检查端点"
  tags: [observability]

rules:
  - name: "health_check"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "所有服务需提供 /health 端点：返回 200 + 各依赖（DB/Redis/queue）状态。"
