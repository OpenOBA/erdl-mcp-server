# ERDL Rule — NO_SECRETS_IN_LOGS
# Category: observability
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_secrets_in_logs"
  description: "日志无密钥"
  tags: [observability]

rules:
  - name: "no_secrets_in_logs"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: 'console\.log.*(password|secret|token|key|pii)'
    then: ALLOW
    message: "日志不要输出密钥/Token/PII。调试信息只记录 ID/hash。"
