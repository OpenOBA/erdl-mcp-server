# ERDL Rule — MEASURE_BEFORE_OPTIMIZE
# Category: performance
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "measure_before_optimize"
  description: "先测量再优化"
  tags: [performance]

rules:
  - name: "measure_before_optimize"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "optimize|benchmark|performance"
    then: ALLOW
    message: "先测量，再优化。没有 baseline 的优化是猜测。"
