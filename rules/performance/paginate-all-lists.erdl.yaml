# ERDL Rule — PAGINATE_ALL_LISTS
# Category: performance
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "paginate_all_lists"
  description: "分页提醒"
  tags: [performance]

rules:
  - name: "paginate_all_lists"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: 'findAll|SELECT \*|limit'
    then: CORRECT
    message: "列表查询必须分页。用 LIMIT + OFFSET 或游标分页。"
