# ERDL Rule — NO STACK TRACE TO USER
# Category: security · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_stack_trace_to_user"
  description: "security rule"
  tags: [security]

rules:
  - name: "no_stack_trace_to_user"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
    then: ALLOW
    message: "生产环境不要对外暴露 stack trace、文件路径、DB错误详情。用错误ID方案：用户看到ID，后端记详情。"