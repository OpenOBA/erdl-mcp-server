# ERDL Rule — VALIDATE ALL INPUT
# Category: security · Advisory
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "validate_all_input"
  description: "security rule"
  tags: [security]

rules:
  - name: "validate_all_input"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
    then: ALLOW
    message: "输入验证：类型→长度→格式→范围。白名单>黑名单。服务端>客户端。文件上传验MIME+魔数。"