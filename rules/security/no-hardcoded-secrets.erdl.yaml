# ERDL Rule — NO_HARDCODED_SECRETS
# Category: security
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_hardcoded_secrets"
  description: "禁止硬编码密钥"
  tags: [security]

rules:
  - name: "no_hardcoded_secrets"
    priority: 3
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: '(password|secret|api[_-]?[kK]ey|token|credential|private[_-]?[kK]ey)\s*[=:]\s*'
    then: DENY
    override: high
    message: "禁止在源码中硬编码密钥。使用环境变量或 Secret Manager。"
