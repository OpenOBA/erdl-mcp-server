# ERDL Rule — HEADING_HIERARCHY
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "heading_hierarchy"
  description: "标题层级"
  tags: [writing]

rules:
  - name: "heading_hierarchy"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "# |## |### |#### "
    then: ALLOW
    message: "标题层级不跳级：H1 → H2 → H3。不出现 H1 直接跳到 H3。"
