# ERDL Rule — NO_AI_JARGON
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_ai_jargon"
  description: "禁止 AI 陈词滥调"
  tags: [writing]

rules:
  - name: "no_ai_jargon"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "delves|unleash|game.changer|revolutionize"
    then: CORRECT
    message: "避免 AI 常用陈词：delves、unleash、game-changer、revolutionize。"
