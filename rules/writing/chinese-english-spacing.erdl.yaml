# ERDL Rule — CHINESE_ENGLISH_SPACING
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "chinese_english_spacing"
  description: "中英文间距"
  tags: [writing]

rules:
  - name: "chinese_english_spacing"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: '[\u4e00-\u9fff][a-zA-Z]|[a-zA-Z][\u4e00-\u9fff]'
    then: CORRECT
    message: "中英文之间加空格。例: use React 而非 useReact。"
