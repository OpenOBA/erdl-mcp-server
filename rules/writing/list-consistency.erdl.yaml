# ERDL Rule — LIST_CONSISTENCY
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "list_consistency"
  description: "列表一致性"
  tags: [writing]

rules:
  - name: "list_consistency"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: '- |\* |1\. |2\. '
    then: ALLOW
    message: "列表内各项的结构和标点保持一致。"
