# ERDL Rule — SHORT_SENTENCES
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "short_sentences"
  description: "短句优先"
  tags: [writing]

rules:
  - name: "short_sentences"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: ALLOW
    message: "用短句。一句说清一个意思。超过 25 字考虑拆分。"
