# ERDL Rule — DIRECT_TONE
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "direct_tone"
  description: "直接语气"
  tags: [writing]

rules:
  - name: "direct_tone"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch", "exec"]
    then: CORRECT
    message: "语气直接精准，不绕弯。长话短说。"
