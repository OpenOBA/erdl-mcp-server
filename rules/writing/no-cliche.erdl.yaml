# ERDL Rule — NO_CLICHE
# Category: writing
# ERDL SPEC §5 compliant
protocol: "erdl/v1"
version: "1.0.0"

metadata:
  name: "no_cliche"
  description: "禁止陈词滥调"
  tags: [writing]

rules:
  - name: "no_cliche"
    priority: 5
    when:
      logic: AND
      conditions:
        - field: "tool.name"
          operator: in
          value: ["write", "edit", "apply_patch"]
        - field: "tool.args"
          operator: match
          value: "think outside|synerg|paradigm|disrupt"
    then: CORRECT
    message: "避免陈词：think outside the box、synergy、paradigm shift、disrupt。"
