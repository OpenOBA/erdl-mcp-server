# ERDL Rules — Writing Presets (Example)
#
# Copy this pattern to create your own writing style rules.

rules:
  no_cliche:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: BLOCK "不要用套话开头。直接切入主题。禁用: 在当今时代/众所周知/值得注意的是。"
    priority: 3
    category: writing
    description: 禁止套话开头

  direct_tone:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: ALLOW "主动语态。主语优先。直接有力。不用模糊表达 (might, could potentially)。"
    priority: 5
    category: writing
    description: 直接有力的语气

  short_sentences:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: ALLOW "句子 < 25 字。段落 < 4 句。用列表展示要点。"
    priority: 10
    category: writing
    description: 短句优先

  no_ai_jargon:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: BLOCK "不要用 AI 套话。禁用: 赋能/抓手/闭环/底层逻辑/降本增效/empower/leverage/ecosystem/synergy。"
    priority: 5
    category: writing
    description: 禁止 AI 套话

  chinese_english_spacing:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: ALLOW "中文和英文/数字加空格。用 Agent 编码 正确。用Agent编码 错误。"
    priority: 3
    category: writing
    description: 中英混排加空格

  heading_hierarchy:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: ALLOW "一个文档一个 H1。用 H2 分节。不跳级 (H2→H4)。"
    priority: 10
    category: writing
    description: 标题层级规范

  list_consistency:
    when: tool.name in ("write_file", "edit", "apply_patch")
    then: ALLOW "列表项保持相同语法结构。标点统一。"
    priority: 15
    category: writing
    description: 列表格式统一
